<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Lotto Number Generator</h1>
        <button id="theme-toggle">Switch to Dark Mode</button>
    </header>
    <main>
        <div class="lotto-container">
            <button id="generate-btn">Generate Numbers</button>
            <div id="lotto-numbers" class="lotto-numbers"></div>
        </div>
    </main>

    <section id="partnership" class="partnership-section">
        <h2>Partnership Inquiry</h2>
        <form action="https://formspree.io/f/xwvrvgdn" method="POST" class="partnership-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Your Name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="_replyto" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="company">Company</label>
                <input type="text" id="company" name="company" placeholder="Company Name (Optional)">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required placeholder="How can we help?"></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Inquiry</button>
        </form>
    </section>

    <script src="main.js"></script>
</body>
</html>
